<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Purchases - Kaksha Digital Library</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <span>Kaksha</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/dashboard}" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a th:href="@{/resources}" class="nav-item">
                    <i class="fas fa-book"></i>
                    <span>Resources</span>
                </a>
                <a th:href="@{/purchases}" class="nav-item active" id="purchasesNav" style="display: none;">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Purchases</span>
                </a>
                <a th:href="@{/my-list}" class="nav-item" id="myListNav" style="display: none;">
                    <i class="fas fa-heart"></i>
                    <span>My List</span>
                </a>
                <a th:href="@{/analytics}" class="nav-item" id="analyticsNav" style="display: none;">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a th:href="@{/manage-resources}" class="nav-item" id="manageResourcesNav" style="display: none;">
                    <i class="fas fa-cog"></i>
                    <span>Manage Resources</span>
                </a>
                <a th:href="@{/catalogs}" class="nav-item" id="catalogsNav" style="display: none;">
                    <i class="fas fa-folder-open"></i>
                    <span>Catalogs</span>
                </a>
                <a th:href="@{/users}" class="nav-item" id="usersNav" style="display: none;">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a th:href="@{/profile}" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>My Purchases</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userName">User</span>
                        <div class="avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dashboard-content">
                <!-- Stats -->
                <div class="stats-grid small">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(107, 33, 168, 0.1); color: #6B21A8;">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalPurchases">0</h3>
                            <p>Total Purchases</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(34, 197, 94, 0.1); color: #22C55E;">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalSpent">0 XAF</h3>
                            <p>Total Spent</p>
                        </div>
                    </div>
                </div>
                
                <!-- Search & Filter -->
                <div class="card filter-card">
                    <div class="filter-row">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Search by resource or invoice...">
                        </div>
                        <div class="filter-group">
                            <select id="statusFilter" class="form-select">
                                <option value="">All Status</option>
                                <option value="PAID">Paid</option>
                                <option value="PENDING">Pending</option>
                                <option value="FAILED">Failed</option>
                            </select>
                            <select id="dateFilter" class="form-select">
                                <option value="">All Time</option>
                                <option value="today">Today</option>
                                <option value="week">This Week</option>
                                <option value="month">This Month</option>
                                <option value="year">This Year</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Purchases Table -->
                <div class="card">
                    <div class="card-header">
                        <h3>Purchase History</h3>
                    </div>
                    <div class="card-body">
                        <table class="data-table" id="purchasesTable">
                            <thead>
                                <tr>
                                    <th>Invoice</th>
                                    <th>Resource</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="purchasesTableBody">
                                <!-- Dynamic content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script th:src="@{/js/api.js}" src="/js/api.js"></script>
    <script th:src="@{/js/purchases.js}" src="/js/purchases.js"></script>
    <script th:src="@{/js/theme.js}" src="/js/theme.js"></script>
</body>
</html>
