<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kaksha Digital Library</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-illustration">
                <div class="illustration-bg">
                    <div class="tree-container">
                        <svg class="tree-svg" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="trunkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#3D2914;stop-opacity:1" />
                                    <stop offset="50%" style="stop-color:#5D3A1A;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#3D2914;stop-opacity:1" />
                                </linearGradient>
                                <linearGradient id="branchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#4A3728;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#3D2914;stop-opacity:1" />
                                </linearGradient>
                                <radialGradient id="leafGradient1" cx="30%" cy="30%" r="70%">
                                    <stop offset="0%" style="stop-color:#7CB342;stop-opacity:0.95" />
                                    <stop offset="100%" style="stop-color:#4B6B1E;stop-opacity:0.85" />
                                </radialGradient>
                                <radialGradient id="leafGradient2" cx="30%" cy="30%" r="70%">
                                    <stop offset="0%" style="stop-color:#8BC34A;stop-opacity:0.9" />
                                    <stop offset="100%" style="stop-color:#558B2F;stop-opacity:0.8" />
                                </radialGradient>
                                <radialGradient id="leafGradient3" cx="30%" cy="30%" r="70%">
                                    <stop offset="0%" style="stop-color:#9CCC65;stop-opacity:0.85" />
                                    <stop offset="100%" style="stop-color:#33691E;stop-opacity:0.75" />
                                </radialGradient>
                            </defs>
                            
                            <!-- Ground shadow -->
                            <ellipse cx="200" cy="465" rx="90" ry="12" fill="#2D3748" opacity="0.15"/>
                            
                            <!-- Tree trunk with natural curves -->
                            <path class="tree-trunk" d="M200 460 Q185 420 190 380 Q175 330 185 280 Q195 230 190 180 Q188 130 195 80 Q198 50 200 35" 
                                fill="none" stroke="url(#trunkGradient)" stroke-width="28" stroke-linecap="round"/>
                            
                            <!-- Main branches -->
                            <path class="branch" d="M188 280 Q140 250 115 225" fill="none" stroke="url(#branchGradient)" stroke-width="10" stroke-linecap="round"/>
                            <path class="branch" d="M192 230 Q245 195 275 170" fill="none" stroke="url(#branchGradient)" stroke-width="9" stroke-linecap="round"/>
                            <path class="branch" d="M190 180 Q150 145 125 115" fill="none" stroke="url(#branchGradient)" stroke-width="7" stroke-linecap="round"/>
                            <path class="branch" d="M193 130 Q230 105 255 85" fill="none" stroke="url(#branchGradient)" stroke-width="6" stroke-linecap="round"/>
                            
                            <!-- Small twigs -->
                            <path d="M115 225 Q100 210 90 200" fill="none" stroke="#4A3728" stroke-width="4" stroke-linecap="round"/>
                            <path d="M275 170 Q295 155 310 145" fill="none" stroke="#4A3728" stroke-width="4" stroke-linecap="round"/>
                            
                            <!-- Leaves clusters - Lower left -->
                            <g class="leaves">
                                <circle cx="90" cy="200" r="32" fill="url(#leafGradient1)"/>
                                <circle cx="70" cy="185" r="26" fill="url(#leafGradient2)"/>
                                <circle cx="110" cy="185" r="28" fill="url(#leafGradient3)"/>
                                <circle cx="85" cy="165" r="22" fill="url(#leafGradient2)"/>
                                <circle cx="105" cy="170" r="20" fill="url(#leafGradient1)"/>
                            </g>
                            
                            <!-- Leaves clusters - Lower right -->
                            <g class="leaves">
                                <circle cx="310" cy="145" r="38" fill="url(#leafGradient1)"/>
                                <circle cx="335" cy="130" r="30" fill="url(#leafGradient3)"/>
                                <circle cx="290" cy="125" r="32" fill="url(#leafGradient2)"/>
                                <circle cx="320" cy="105" r="26" fill="url(#leafGradient2)"/>
                                <circle cx="300" cy="100" r="24" fill="url(#leafGradient1)"/>
                            </g>
                            
                            <!-- Leaves clusters - Upper left -->
                            <g class="leaves">
                                <circle cx="125" cy="115" r="35" fill="url(#leafGradient1)"/>
                                <circle cx="105" cy="95" r="28" fill="url(#leafGradient2)"/>
                                <circle cx="145" cy="95" r="30" fill="url(#leafGradient3)"/>
                                <circle cx="115" cy="75" r="24" fill="url(#leafGradient3)"/>
                                <circle cx="135" cy="80" r="22" fill="url(#leafGradient1)"/>
                            </g>
                            
                            <!-- Leaves clusters - Upper right -->
                            <g class="leaves">
                                <circle cx="255" cy="85" r="30" fill="url(#leafGradient2)"/>
                                <circle cx="275" cy="70" r="25" fill="url(#leafGradient1)"/>
                                <circle cx="235" cy="70" r="26" fill="url(#leafGradient3)"/>
                            </g>
                            
                            <!-- Leaves clusters - Top center -->
                            <g class="leaves">
                                <circle cx="200" cy="45" r="42" fill="url(#leafGradient1)"/>
                                <circle cx="175" cy="35" r="32" fill="url(#leafGradient2)"/>
                                <circle cx="225" cy="35" r="34" fill="url(#leafGradient3)"/>
                                <circle cx="190" cy="15" r="28" fill="url(#leafGradient3)"/>
                                <circle cx="210" cy="18" r="26" fill="url(#leafGradient2)"/>
                                <circle cx="200" cy="5" r="22" fill="url(#leafGradient1)"/>
                            </g>
                            
                            <!-- Accent highlights -->
                            <circle cx="185" cy="200" r="4" fill="#AED581" opacity="0.6"/>
                            <circle cx="295" cy="135" r="5" fill="#AED581" opacity="0.5"/>
                            <circle cx="115" cy="105" r="4" fill="#AED581" opacity="0.6"/>
                            <circle cx="200" cy="35" r="6" fill="#AED581" opacity="0.7"/>
                        </svg>
                    </div>
                    <div class="swing-girl">
                        <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
                            <!-- Swing rope -->
                            <line x1="50" y1="0" x2="50" y2="60" stroke="#4B5320" stroke-width="2"/>
                            <!-- Girl reading -->
                            <circle cx="50" cy="45" r="12" fill="#FCD34D"/> <!-- Head -->
                            <ellipse cx="50" cy="75" rx="15" ry="20" fill="#4B5320"/> <!-- Dress -->
                            <ellipse cx="50" cy="70" rx="18" ry="8" fill="white" opacity="0.9"/> <!-- Book -->
                            <line x1="35" y1="90" x2="35" y2="110" stroke="#FCD34D" stroke-width="6" stroke-linecap="round"/> <!-- Left leg -->
                            <line x1="65" y1="90" x2="65" y2="105" stroke="#FCD34D" stroke-width="6" stroke-linecap="round"/> <!-- Right leg -->
                        </svg>
                    </div>
                </div>
                <div class="brand-text">
                    <h1>Kaksha</h1>
                    <p>Digital Library Platform</p>
                </div>
            </div>
        </div>
        
        <div class="auth-right">
            <div class="auth-form-container">
                <a th:href="@{/}" class="back-home">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Please enter your credentials to continue</p>
                </div>
                
                <form id="loginForm" class="auth-form" onsubmit="event.preventDefault(); return false;">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                        <span class="btn-text">Login</span>
                        <span class="btn-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                        </span>
                    </button>
                    
                </form>
                
                <div class="auth-footer">
                    <p>Don't have an account? <a th:href="@{/register}">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/api.js}" src="/js/api.js"></script>
    <script th:src="@{/js/auth.js}" src="/js/auth.js"></script>
    <script th:src="@{/js/theme.js}" src="/js/theme.js"></script>
</body>
</html>
