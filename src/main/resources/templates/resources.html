<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources - Kaksha Digital Library</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <span>Kaksha</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/dashboard}" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a th:href="@{/resources}" class="nav-item active">
                    <i class="fas fa-book"></i>
                    <span>Resources</span>
                </a>
                <a th:href="@{/purchases}" class="nav-item" id="purchasesNav" style="display: none;">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Purchases</span>
                </a>
                <a th:href="@{/my-list}" class="nav-item" id="myListNav" style="display: none;">
                    <i class="fas fa-heart"></i>
                    <span>My List</span>
                </a>
                <a th:href="@{/analytics}" class="nav-item" id="analyticsNav" style="display: none;">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a th:href="@{/manage-resources}" class="nav-item" id="manageResourcesNav" style="display: none;">
                    <i class="fas fa-cog"></i>
                    <span>Manage Resources</span>
                </a>
                <a th:href="@{/catalogs}" class="nav-item" id="catalogsNav" style="display: none;">
                    <i class="fas fa-folder-open"></i>
                    <span>Catalogs</span>
                </a>
                <a th:href="@{/users}" class="nav-item" id="usersNav" style="display: none;">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a th:href="@{/profile}" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Library Resources</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userName">User</span>
                        <div class="avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dashboard-content">
                <!-- Resource Sections (Recommended, Newly Added, Top Rated) -->
                <div id="recommendedSection"></div>
                <div id="newlyAddedSection"></div>
                <div id="topRatedSection"></div>
                
                <!-- All Resources Header -->
                <div class="section-header" style="margin-top: 2rem;">
                    <h2 class="section-title">
                        <i class="fas fa-th-large"></i>
                        All Resources
                    </h2>
                </div>
                
                <!-- Search & Filter -->
                <div class="card filter-card">
                    <div class="filter-row">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Search resources...">
                        </div>
                        <div class="filter-group">
                            <select id="categoryFilter" class="form-select">
                                <option value="">All Categories</option>
                                <option value="BOOK">Books</option>
                                <option value="JOURNAL">Journals</option>
                                <option value="ARTICLE">Articles</option>
                                <option value="VIDEO">Videos</option>
                                <option value="AUDIO">Audio</option>
                                <option value="DOCUMENT">Documents</option>
                            </select>
                            <select id="sortBy" class="form-select">
                                <option value="newest">Newest First</option>
                                <option value="oldest">Oldest First</option>
                                <option value="name">Name A-Z</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Resources Grid -->
                <div class="resources-grid-compact" id="resourcesGrid">
                    <!-- Dynamic content -->
                </div>
                
                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <!-- Dynamic content -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- Resource Detail Modal -->
    <div class="modal" id="resourceModal" style="display: none;">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 id="modalResourceTitle">Resource Title</h3>
                <button type="button" class="close-modal" onclick="closeResourceModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalResourceBody">
                <!-- Dynamic content -->
            </div>
            <div class="modal-footer" id="modalResourceFooter">
                <!-- Dynamic buttons -->
            </div>
        </div>
    </div>

    <!-- Rating Modal -->
    <div class="modal" id="ratingModal" style="display: none;">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h3 id="ratingResourceTitle">Rate Resource</h3>
                <button type="button" class="close-modal" onclick="closeRatingModal()">&times;</button>
            </div>
            <div class="modal-body" style="text-align: center;">
                <p style="margin-bottom: 1rem; color: var(--text-medium);">Click a star to rate this resource</p>
                <div class="rating-stars" style="display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                    <button class="rating-star" onclick="setRating(1)" style="background: none; border: none; cursor: pointer; padding: 0.25rem;">
                        <i class="far fa-star" style="font-size: 1.75rem; color: #FBBF24; transition: all 0.2s;"></i>
                    </button>
                    <button class="rating-star" onclick="setRating(2)" style="background: none; border: none; cursor: pointer; padding: 0.25rem;">
                        <i class="far fa-star" style="font-size: 1.75rem; color: #FBBF24; transition: all 0.2s;"></i>
                    </button>
                    <button class="rating-star" onclick="setRating(3)" style="background: none; border: none; cursor: pointer; padding: 0.25rem;">
                        <i class="far fa-star" style="font-size: 1.75rem; color: #FBBF24; transition: all 0.2s;"></i>
                    </button>
                    <button class="rating-star" onclick="setRating(4)" style="background: none; border: none; cursor: pointer; padding: 0.25rem;">
                        <i class="far fa-star" style="font-size: 1.75rem; color: #FBBF24; transition: all 0.2s;"></i>
                    </button>
                    <button class="rating-star" onclick="setRating(5)" style="background: none; border: none; cursor: pointer; padding: 0.25rem;">
                        <i class="far fa-star" style="font-size: 1.75rem; color: #FBBF24; transition: all 0.2s;"></i>
                    </button>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label for="ratingComment" style="font-size: 0.875rem; color: var(--text-medium); margin-bottom: 0.5rem; display: block;">Comment (optional)</label>
                    <textarea id="ratingComment" rows="3" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.5rem; background: var(--input-bg); color: var(--text-dark); resize: vertical;" placeholder="Share your thoughts about this resource..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeRatingModal()">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="submitRating()">
                    <i class="fas fa-paper-plane"></i> Submit Rating
                </button>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/api.js}" src="/js/api.js"></script>
    <script th:src="@{/js/resources.js}" src="/js/resources.js"></script>
    <script th:src="@{/js/theme.js}" src="/js/theme.js"></script>
</body>
</html>
