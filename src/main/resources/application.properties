# suppress inspection "SpringBootApplicationProperties" for whole file
# Kaksha Digital Library - Application Properties
# ============================================

# Application
spring.application.name=Kaksha Digital Library
app.name=Kaksha Digital Library
app.frontend-url=${FRONTEND_URL:http://localhost:8080}

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://mysql.railway.internal:3306/railway?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:YEfqJTsfBOhBCWleALJcMLpFAqHxcZox}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool (Performance Optimization)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=KakshaHikariPool

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# SQL Initialization - set to 'never' to let Hibernate manage schema
spring.sql.init.mode=never

# Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:kenfackmenes@gmail.com}
spring.mail.password=${MAIL_PASSWORD:cxaf uagn nfnk gnfz}
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Response Time SLA Target (2 seconds as per NFR-04)
app.performance.response-time-ms=2000

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-and-secure}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Campay Payment Configuration (Sandbox)
campay.api-key=${CAMPAY_API_KEY:6bNitkJonMKZ_q6OxFcNpp-1fn1rJ86HpxeoB-tYr9ee4HsDeDr77ubbfhWr3NSJY2MHXSEJTrbTM32UStgpBQ}
campay.api-secret=${CAMPAY_API_SECRET:MxVxlrRxK67kuXYDbJEfJdJHtoPhdqy7gQUhmHFJZS3HzLbHYMSMyFx490b0mhNATXI-1OjLh8kdQwt0X86PDw}
campay.webhook-secret=${CAMPAY_WEBHOOK_SECRET:6MzLjabTsFipE_2B2wkuKPg-1Q7znZfargyexvtxBDQzu34aQOmfcVE66MqJ8sP3OmhnXbpAtNoGKfJNvRDIQQ}
campay.base-url=https://demo.campay.net/api
campay.currency=XAF
campay.callback-url=${CAMPAY_CALLBACK_URL:http://localhost:8080/api/purchase/campay/callback}

# Actuator Health Monitoring (NFR-03)
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.tomcat=true

# Caffeine Cache Configuration (NFR-04)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s,recordStats

# Rate Limiting Configuration (NFR-04)
app.ratelimit.enabled=true
app.ratelimit.capacity=100
app.ratelimit.refill-rate=10
app.ratelimit.refill-period=1

# Async Configuration (NFR-03 & NFR-04)
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-

# Logging
logging.level.com.kaksha.library=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.cache=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Custom Upload Settings
app.upload.dir=uploads
app.upload.file-path=/uploads/files
app.upload.image-path=/uploads/images

# Backup Configuration
app.backup.enabled=true
app.backup.directory=backups
app.backup.retention-days=90
app.backup.mysql.dump-path=mysqldump
app.backup.mysql.restore-path=mysql

# Session Management - Terminate session when browser closes
server.servlet.session.timeout=15m
server.servlet.session.cookie.max-age=0
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
