<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Kaksha Digital Library</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <span>Kaksha</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/resources.html" class="nav-item">
                    <i class="fas fa-book"></i>
                    <span>Resources</span>
                </a>
                <a href="/purchases.html" class="nav-item" id="purchasesNav" style="display: none;">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Purchases</span>
                </a>
                <a href="/my-list" class="nav-item" id="myListNav" style="display: none;">
                    <i class="fas fa-heart"></i>
                    <span>My List</span>
                </a>
                <a href="/analytics.html" class="nav-item" id="analyticsNav" style="display: none;">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a href="/manage-resources.html" class="nav-item" id="manageResourcesNav" style="display: none;">
                    <i class="fas fa-cog"></i>
                    <span>Manage Resources</span>
                </a>
                <a href="/catalogs.html" class="nav-item" id="catalogsNav" style="display: none;">
                    <i class="fas fa-folder-open"></i>
                    <span>Catalogs</span>
                </a>
                <a href="/users.html" class="nav-item" id="usersNav" style="display: none;">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a href="/profile.html" class="nav-item active">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>My Profile</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userName">User</span>
                        <div class="avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dashboard-content">
                <div class="profile-grid">
                    <!-- Profile Info Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3>Profile Information</h3>
                            <button class="btn btn-sm btn-primary" onclick="enableEdit()">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                        </div>
                        <div class="card-body">
                            <form id="profileForm">
                                <div class="avatar-section">
                                    <div class="profile-avatar">
                                        <i class="fas fa-user-circle"></i>
                                    </div>
                                    <div class="tier-badge" id="userTierBadge">BASIC</div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>First Name</label>
                                        <div class="input-group">
                                            <i class="fas fa-user"></i>
                                            <input type="text" id="profileFirstName" disabled>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Last Name</label>
                                        <div class="input-group">
                                            <i class="fas fa-user"></i>
                                            <input type="text" id="profileLastName" disabled>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Username</label>
                                    <div class="input-group">
                                        <i class="fas fa-at"></i>
                                        <input type="text" id="profileUsername" disabled>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <div class="input-group">
                                        <i class="fas fa-envelope"></i>
                                        <input type="email" id="profileEmail" disabled>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Date of Birth</label>
                                    <div class="input-group">
                                        <i class="fas fa-calendar"></i>
                                        <input type="date" id="profileDob" disabled>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Role</label>
                                    <div class="input-group">
                                        <i class="fas fa-user-tag"></i>
                                        <input type="text" id="profileRole" disabled>
                                    </div>
                                </div>
                                <div class="form-actions" id="editActions" style="display: none;">
                                    <button type="button" class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
                                    <button type="submit" class="btn btn-primary">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    
                    <!-- Account Settings -->
                    <div class="card">
                        <div class="card-header">
                            <h3>Account Settings</h3>
                        </div>
                        <div class="card-body">
                            <div class="settings-section">
                                <h4>Change Password</h4>
                                <form id="passwordForm">
                                    <div class="form-group">
                                        <label>Current Password</label>
                                        <div class="input-group">
                                            <i class="fas fa-lock"></i>
                                            <input type="password" id="currentPassword" required>
                                            <button type="button" class="toggle-password" onclick="togglePassword('currentPassword')">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>New Password</label>
                                        <div class="input-group">
                                            <i class="fas fa-lock"></i>
                                            <input type="password" id="newPassword" required>
                                            <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Confirm New Password</label>
                                        <div class="input-group">
                                            <i class="fas fa-lock"></i>
                                            <input type="password" id="confirmNewPassword" required>
                                            <button type="button" class="toggle-password" onclick="togglePassword('confirmNewPassword')">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Update Password</button>
                                </form>
                            </div>
                            <hr>
                            <div class="settings-section">
                                <h4>Subscription</h4>
                                <div class="subscription-info" id="subscriptionInfo">
                                    <p>Current Plan: <strong id="currentPlan">Basic</strong></p>
                                    <p id="upgradeText">Upgrade to Premium for full access to all resources.</p>
                                    <button class="btn btn-primary" id="upgradeBtn" onclick="upgradeToPremium()">
                                        Upgrade to Premium
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/js/api.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
