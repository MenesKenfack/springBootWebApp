<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources - Kaksha Digital Library</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <span>Kaksha</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/resources.html" class="nav-item active">
                    <i class="fas fa-book"></i>
                    <span>Resources</span>
                </a>
                <a href="/purchases.html" class="nav-item" id="purchasesNav" style="display: none;">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Purchases</span>
                </a>
                <a href="/my-list" class="nav-item" id="myListNav" style="display: none;">
                    <i class="fas fa-heart"></i>
                    <span>My List</span>
                </a>
                <a href="/analytics.html" class="nav-item" id="analyticsNav" style="display: none;">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a href="/manage-resources.html" class="nav-item" id="manageResourcesNav" style="display: none;">
                    <i class="fas fa-cog"></i>
                    <span>Manage Resources</span>
                </a>
                <a href="/catalogs.html" class="nav-item" id="catalogsNav" style="display: none;">
                    <i class="fas fa-folder-open"></i>
                    <span>Catalogs</span>
                </a>
                <a href="/users.html" class="nav-item" id="usersNav" style="display: none;">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a href="/profile.html" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Library Resources</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userName">User</span>
                        <div class="avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dashboard-content">
                <!-- Search & Filter -->
                <div class="card filter-card">
                    <div class="filter-row">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Search resources...">
                        </div>
                        <div class="filter-group">
                            <select id="categoryFilter" class="form-select">
                                <option value="">All Categories</option>
                                <option value="BOOK">Books</option>
                                <option value="JOURNAL">Journals</option>
                                <option value="ARTICLE">Articles</option>
                                <option value="VIDEO">Videos</option>
                                <option value="AUDIO">Audio</option>
                                <option value="DOCUMENT">Documents</option>
                            </select>
                            <select id="sortBy" class="form-select">
                                <option value="newest">Newest First</option>
                                <option value="oldest">Oldest First</option>
                                <option value="name">Name A-Z</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Resources Grid -->
                <div class="resources-grid full-width" id="resourcesGrid">
                    <!-- Dynamic content -->
                </div>
                
                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <!-- Dynamic content -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- Resource Detail Modal -->
    <div id="resourceModal" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 id="modalResourceTitle">Resource Details</h3>
                <button type="button" class="close-modal" onclick="closeResourceModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalResourceBody">
                <!-- Dynamic content -->
            </div>
            <div class="modal-footer" id="modalResourceFooter">
                <!-- Dynamic buttons -->
            </div>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script src="/js/resources.js"></script>
</body>
</html>
