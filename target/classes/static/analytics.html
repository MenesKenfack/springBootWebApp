<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Kaksha Digital Library</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <span>Kaksha</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/resources.html" class="nav-item">
                    <i class="fas fa-book"></i>
                    <span>Resources</span>
                </a>
                <a href="/purchases.html" class="nav-item" id="purchasesNav" style="display: none;">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Purchases</span>
                </a>
                <a href="/my-list" class="nav-item" id="myListNav" style="display: none;">
                    <i class="fas fa-heart"></i>
                    <span>My List</span>
                </a>
                <a href="/analytics.html" class="nav-item active" id="analyticsNav">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a href="/manage-resources.html" class="nav-item" id="manageResourcesNav" style="display: none;">
                    <i class="fas fa-cog"></i>
                    <span>Manage Resources</span>
                </a>
                <a href="/catalogs.html" class="nav-item" id="catalogsNav" style="display: none;">
                    <i class="fas fa-folder-open"></i>
                    <span>Catalogs</span>
                </a>
                <a href="/users.html" class="nav-item" id="usersNav" style="display: none;">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a href="/profile.html" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Analytics & Reports</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userName">User</span>
                        <div class="avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dashboard-content">
                <!-- Report Filters -->
                <div class="card filter-card">
                    <div class="filter-row">
                        <div class="filter-group">
                            <select id="reportType" class="form-select">
                                <option value="SUMMARY">Summary Report</option>
                                <option value="DETAILED">Detailed Report</option>
                                <option value="REVENUE">Revenue Report</option>
                                <option value="USAGE">Usage Report</option>
                            </select>
                            <select id="dateRange" class="form-select">
                                <option value="LAST_7_DAYS">Last 7 Days</option>
                                <option value="LAST_30_DAYS" selected>Last 30 Days</option>
                                <option value="THIS_MONTH">This Month</option>
                                <option value="LAST_MONTH">Last Month</option>
                                <option value="LAST_90_DAYS">Last 90 Days</option>
                            </select>
                            <button class="btn btn-primary" onclick="generateReport()">
                                <i class="fas fa-sync-alt"></i> Generate
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Summary Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(107, 33, 168, 0.1); color: #6B21A8;">
                            <i class="fas fa-book"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="reportTotalResources">0</h3>
                            <p>Total Resources</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(34, 197, 94, 0.1); color: #22C55E;">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="reportTotalUsers">0</h3>
                            <p>Total Users</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(234, 179, 8, 0.1); color: #EAB308;">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="reportTotalRevenue">$0</h3>
                            <p>Total Revenue</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(59, 130, 246, 0.1); color: #3B82F6;">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="reportTotalPurchases">0</h3>
                            <p>Total Purchases</p>
                        </div>
                    </div>
                </div>
                
                <!-- Charts -->
                <div class="dashboard-grid">
                    <div class="card chart-card">
                        <div class="card-header">
                            <h3>Revenue Trend</h3>
                        </div>
                        <div class="card-body">
                            <canvas id="revenueTrendChart"></canvas>
                        </div>
                    </div>
                    <div class="card chart-card">
                        <div class="card-header">
                            <h3>Resource Categories</h3>
                        </div>
                        <div class="card-body">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <!-- Detailed Table -->
                <div class="card">
                    <div class="card-header">
                        <h3>Detailed Statistics</h3>
                        <button class="btn btn-secondary" onclick="exportReport()">
                            <i class="fas fa-download"></i> Export
                        </button>
                    </div>
                    <div class="card-body">
                        <table class="data-table" id="analyticsTable">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Accesses</th>
                                    <th>Purchases</th>
                                    <th>Revenue</th>
                                </tr>
                            </thead>
                            <tbody id="analyticsTableBody">
                                <!-- Dynamic content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/js/api.js"></script>
    <script src="/js/analytics.js"></script>
</body>
</html>
