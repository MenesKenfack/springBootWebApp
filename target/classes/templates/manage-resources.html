<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Resources - Kaksha Digital Library</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <span>Kaksha</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/dashboard}" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a th:href="@{/resources}" class="nav-item">
                    <i class="fas fa-book"></i>
                    <span>Resources</span>
                </a>
                <a th:href="@{/analytics}" class="nav-item" id="analyticsNav" style="display: none;">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a th:href="@{/manage-resources}" class="nav-item" id="manageResourcesNav" style="display: none;">
                    <i class="fas fa-cog"></i>
                    <span>Manage Resources</span>
                </a>
                <a th:href="@{/catalogs}" class="nav-item" id="catalogsNav" style="display: none;">
                    <i class="fas fa-folder-open"></i>
                    <span>Catalogs</span>
                </a>
                <a th:href="@{/users}" class="nav-item" id="usersNav" style="display: none;">
                    <i class="fas fa-users"></i>
                    <span>Patrons</span>
                </a>
                <a th:href="@{/profile}" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Manage Resources</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="openAddResourceModal()">
                        <i class="fas fa-plus"></i> Add Resource
                    </button>
                    <div class="user-info">
                        <span id="userName">User</span>
                        <div class="avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dashboard-content">
                <!-- Search & Filter -->
                <div class="card filter-card">
                    <div class="filter-row">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Search resources...">
                        </div>
                        <div class="filter-group">
                            <select id="categoryFilter" class="form-select">
                                <option value="">All Categories</option>
                                <option value="BOOK">Books</option>
                                <option value="JOURNAL">Journals</option>
                                <option value="ARTICLE">Articles</option>
                                <option value="VIDEO">Videos</option>
                                <option value="AUDIO">Audio</option>
                                <option value="DOCUMENT">Documents</option>
                            </select>
                            <select id="catalogFilter" class="form-select">
                                <option value="">All Catalogs</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Resources Table -->
                <div class="card">
                    <div class="card-body">
                        <table class="data-table" id="resourcesTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Author</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Premium</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="resourcesTableBody">
                                <!-- Dynamic content -->
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer">
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Add/Edit Resource Modal -->
    <div id="resourceModal" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 id="modalTitle">Add Resource</h3>
                <button type="button" class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="resourceForm" class="modal-form">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Title *</label>
                            <div class="input-group">
                                <i class="fas fa-heading"></i>
                                <input type="text" id="title" name="title" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="isbn">ISBN</label>
                            <div class="input-group">
                                <i class="fas fa-barcode"></i>
                                <input type="text" id="isbn" name="isbn">
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="author">Author</label>
                            <div class="input-group">
                                <i class="fas fa-user-edit"></i>
                                <input type="text" id="author" name="author">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="publicationYear">Publication Year</label>
                            <div class="input-group">
                                <i class="fas fa-calendar-alt"></i>
                                <input type="number" id="publicationYear" name="publicationYear" min="1900" max="2099">
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="category">Category *</label>
                            <div class="input-group">
                                <i class="fas fa-folder"></i>
                                <select id="category" name="category" required>
                                    <option value="BOOK">Book</option>
                                    <option value="JOURNAL">Journal</option>
                                    <option value="ARTICLE">Article</option>
                                    <option value="VIDEO">Video</option>
                                    <option value="AUDIO">Audio</option>
                                    <option value="DOCUMENT">Document</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="catalogId">Catalog *</label>
                            <div class="input-group">
                                <i class="fas fa-list"></i>
                                <select id="catalogId" name="catalogId" required>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="price">Price</label>
                            <div class="input-group">
                                <i class="fas fa-tag"></i>
                                <input type="number" id="price" name="price" min="0" step="0.01">
                            </div>
                        </div>
                        <div class="form-group checkbox-group">
                            <label class="checkbox-container">
                                <input type="checkbox" id="isPremiumOnly" name="isPremiumOnly">
                                <span class="checkmark"></span>
                                Premium Only
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <div class="input-group">
                            <i class="fas fa-align-left"></i>
                            <textarea id="description" name="description" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="resourceFile">Resource File</label>
                            <div class="input-group">
                                <i class="fas fa-file-upload"></i>
                                <input type="file" id="resourceFile" name="resourceFile" accept=".pdf,.doc,.docx,.mp4,.mp3,.txt">
                            </div>
                            <small class="form-text">Accepted: PDF, DOC, DOCX, MP4, MP3, TXT</small>
                        </div>
                        <div class="form-group">
                            <label for="resourceImage">Cover Image</label>
                            <div class="input-group">
                                <i class="fas fa-image"></i>
                                <input type="file" id="resourceImage" name="resourceImage" accept="image/*">
                            </div>
                            <small class="form-text">Accepted: JPG, PNG, GIF, WEBP</small>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Resource</button>
                </div>
            </form>
        </div>
    </div>
    
    <script th:src="@{/js/api.js}" src="/js/api.js"></script>
    <script th:src="@{/js/manage-resources.js}" src="/js/manage-resources.js"></script>
    <script th:src="@{/js/theme.js}" src="/js/theme.js"></script>
</body>
</html>
