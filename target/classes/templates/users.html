<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patron Management - Kaksha Digital Library</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <span>Kaksha</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/dashboard}" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a th:href="@{/resources}" class="nav-item" id="resourcesNav" style="display: none;">
                    <i class="fas fa-book"></i>
                    <span>Resources</span>
                </a>
                <a th:href="@{/analytics}" class="nav-item" id="analyticsNav" style="display: none;">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a th:href="@{/manage-resources}" class="nav-item" id="manageResourcesNav" style="display: none;">
                    <i class="fas fa-cog"></i>
                    <span>Manage Resources</span>
                </a>
                <a th:href="@{/catalogs}" class="nav-item" id="catalogsNav" style="display: none;">
                    <i class="fas fa-folder-open"></i>
                    <span>Catalogs</span>
                </a>
                <a th:href="@{/users}" class="nav-item active" id="usersNav">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a th:href="@{/terms}" class="nav-item" id="termsNav" style="display: none;">
                    <i class="fas fa-file-contract"></i>
                    <span>Terms & Conditions</span>
                </a>
                <a th:href="@{/backup}" class="nav-item" id="backupNav" style="display: none;">
                    <i class="fas fa-hdd"></i>
                    <span>Backup & Recovery</span>
                </a>
                <a th:href="@{/profile}" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Patron Management</h1>
                </div>
                <div class="header-right">
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="openAddLibrarianModal()">
                            <i class="fas fa-plus"></i> Add Librarian
                        </button>
                    </div>
                    <div class="user-info">
                        <span id="userName">User</span>
                        <div class="avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dashboard-content">
                <!-- Filter -->
                <div class="card filter-card">
                    <div class="filter-row">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Search users...">
                        </div>
                        <div class="filter-group">
                            <select id="roleFilter" class="form-select">
                                <option value="">All Roles</option>
                                <option value="ROLE_CLIENT">Client</option>
                                <option value="ROLE_LIBRARIAN">Librarian</option>
                                <option value="ROLE_MANAGER">Manager</option>
                            </select>
                            <select id="tierFilter" class="form-select">
                                <option value="">All Tiers</option>
                                <option value="BASIC">Basic</option>
                                <option value="PREMIUM">Premium</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Users Table -->
                <div class="card">
                    <div class="card-body">
                        <table class="data-table" id="usersTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Tier</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <!-- Dynamic content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Add User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add User</h3>
                <button type="button" class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="userForm" class="modal-form">
                <div class="modal-body">
                    <input type="hidden" id="userType" name="userType">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name *</label>
                            <div class="input-group">
                                <i class="fas fa-user"></i>
                                <input type="text" id="firstName" name="firstName" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name *</label>
                            <div class="input-group">
                                <i class="fas fa-user"></i>
                                <input type="text" id="lastName" name="lastName" required>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="username">Username *</label>
                            <div class="input-group">
                                <i class="fas fa-at"></i>
                                <input type="text" id="username" name="username" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="dateOfBirth">Date of Birth *</label>
                            <div class="input-group">
                                <i class="fas fa-calendar"></i>
                                <input type="date" id="dateOfBirth" name="dateOfBirth" required>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password *</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" name="password" required>
                                <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password *</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="confirmPassword" name="confirmPassword" required>
                                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save User</button>
                </div>
            </form>
        </div>
    </div>
    
    <script th:src="@{/js/api.js}" src="/js/api.js"></script>
    <script th:src="@{/js/users.js}" src="/js/users.js"></script>
    <script th:src="@{/js/theme.js}" src="/js/theme.js"></script>
</body>
</html>
